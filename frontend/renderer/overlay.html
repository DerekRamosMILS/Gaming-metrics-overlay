<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src ws://127.0.0.1:29874;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>

  <!-- Contenedor principal del overlay -->
  <div id="overlay" class="overlay">

    <!-- FPS -->
    <div class="metric-row" id="row-fps">
      <span class="metric-label">FPS</span>
      <span class="metric-value" id="val-fps">--</span>
    </div>

    <!-- CPU -->
    <div class="metric-row" id="row-cpu-usage">
      <span class="metric-label">CPU</span>
      <span class="metric-value" id="val-cpu-usage">--%</span>
    </div>

    <div class="metric-row" id="row-cpu-temp">
      <span class="metric-label">CPU TEMP</span>
      <span class="metric-value" id="val-cpu-temp">--°C</span>
    </div>

    <!-- GPU -->
    <div class="metric-row" id="row-gpu-usage">
      <span class="metric-label">GPU</span>
      <span class="metric-value" id="val-gpu-usage">--%</span>
    </div>

    <div class="metric-row" id="row-gpu-temp">
      <span class="metric-label">GPU TEMP</span>
      <span class="metric-value" id="val-gpu-temp">--°C</span>
    </div>

    <!-- RAM -->
    <div class="metric-row" id="row-ram">
      <span class="metric-label">RAM</span>
      <span class="metric-value" id="val-ram">--%</span>
    </div>

    <!-- Reloj -->
    <div class="metric-row" id="row-clock">
      <span class="metric-value clock" id="val-clock">--:--:--</span>
    </div>

    <!-- Indicador de estado de conexión (invisible en tema minimal) -->
    <div id="connection-dot" class="connection-dot disconnected"></div>

  </div>

  <script src="overlay.js"></script>
</body>
</html>
